security:
    # 1. Gestion du hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Définition de la hiérarchie 
    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER

    # 3. Source des utilisateurs 
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username # On utilise le username pour se connecter

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        
        main:
            lazy: true
            provider: app_user_provider

            # Configuration pour React (JSON au lieu de formulaire HTML)
            json_login:
                check_path: app_login # Nom de la route dans ton SecurityController
                username_path: username
                password_path: password

            logout:
                path: app_logout

    # 4. Contrôle d'accès
    access_control:
        # Permet d'accéder à la route de login sans être connecté
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        
        # Exemple : Seul un admin peut accéder au back-office
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10