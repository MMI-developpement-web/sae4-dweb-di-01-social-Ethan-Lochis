security:
    # 1. Gestion du hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Définition de la hiérarchie 
    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER

    # 3. Source des utilisateurs 
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username # On utilise le username pour se connecter

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
            
        # Nouveau firewall pour EasyAdmin
        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin_dashboard
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login

        # Firewall actuel pour ton API React (JSON et JWT token)
        main:
            lazy: true
            provider: app_user_provider

            # Configuration pour React (JSON au lieu de formulaire HTML)
            json_login:
                check_path: app_login # Nom de la route dans ton AuthController (/api/login)
                username_path: username
                password_path: password

            # Active la vérification automatique du header Authorization: Bearer <token>
            access_token:
                token_handler: App\Security\AccessTokenHandler

            logout:
                path: app_logout

    # 4. Contrôle d'accès
    access_control:
        # Permet de voir la page de connexion admin
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        
        # Routes API publiques
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/users$, roles: PUBLIC_ACCESS, methods: [POST] }
        
        # GET sur /api/posts est public (lecture des posts)
        - { path: ^/api/posts, roles: PUBLIC_ACCESS, methods: [GET] }
        
        # Autres routes API nécessitent authentification
        - { path: ^/api, roles: ROLE_USER }
        
        # Exemple : Seul un admin peut accéder au back-office
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10